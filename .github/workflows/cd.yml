name: Continuous Delivery

# Consolidated CI/CD pipeline — replaces ci.yml, security.yml, container.yml,
# documentation.yml, ai-sdlc-gates.yml, and deploy-pilot.yml
#
# Pipeline stages:
#   1. Quality Gate (lint, typecheck, schemas, translations, safety, tests)
#   2. Security Gate (secrets, dependencies, SAST, container scan)
#   3. Deploy (Terraform infra + agents-cli app deploy) — REQUIRES MANUAL APPROVAL
#
# Triggers:
#   - PR to main: Quality + Security gates only (no deploy)
#   - Push to main: Full pipeline → deploy waits for human approval in "pilot" environment
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID   - Your Google Cloud project ID
#   GEMINI_API_KEY    - Gemini API key for agent LLM access
#   GCP_SA_KEY        - Service account JSON key
#
# Release Gating:
#   The "pilot" GitHub environment is configured with required reviewers.
#   When code is pushed to main, quality + security gates run automatically.
#   The deploy job starts but PAUSES — a designated reviewer must click
#   "Review deployments" → "Approve" in the GitHub Actions UI before
#   Terraform and agents-cli deploy execute.
#
# To configure the approval gate:
#   Settings → Environments → New environment → Name: "pilot"
#   → Required reviewers → Add your team members
#
# Features are NOT live until the deploy is approved.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════
  # Stage 1: Quality Gate
  # ═══════════════════════════════════════════════════════════
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync --all-extras --dev
        pip install google-agents-cli

    - name: Lint (agents-cli lint)
      run: uv run agents-cli lint
      continue-on-error: true

    - name: Validate schemas
      run: uv run python -m tools.ai_sdlc.cli validate --schemas

    - name: Validate translations
      run: uv run python -m tools.ai_sdlc.cli validate --translations

    - name: Validate safety
      run: uv run python -m tools.ai_sdlc.cli validate --safety

    - name: Run tests with evidence
      run: uv run python -m tools.ai_sdlc.cli test --evidence

    - name: Verify documentation
      run: |
        test -f README.md || (echo "❌ README.md missing" && exit 1)
        test -f AGENTS.md || (echo "❌ AGENTS.md missing" && exit 1)
        test -f .ai-sdlc/README.md || (echo "❌ .ai-sdlc/README.md missing" && exit 1)
        echo "✅ Documentation verified"

    - name: Upload quality evidence
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: quality-evidence
        path: |
          .ai-sdlc/evidence/tests/
          .ai-sdlc/evidence/safety/
          .ai-sdlc/evidence/evidence-manifest.json

  # ═══════════════════════════════════════════════════════════
  # Stage 2: Security Gate
  # ═══════════════════════════════════════════════════════════
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync --all-extras --dev

    - name: Install security tools
      run: |
        # Install Trivy directly (more reliable than GitHub Action)
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        echo "Trivy installed: $(trivy --version 2>&1 || echo 'not available')"

    - name: Secret scan
      run: uv run python -m tools.ai_sdlc.cli security --secrets
      continue-on-error: true

    - name: Dependency scan
      run: uv run python -m tools.ai_sdlc.cli security --dependencies
      continue-on-error: true

    - name: SAST scan
      run: uv run python -m tools.ai_sdlc.cli security --sast
      continue-on-error: true

    - name: Container scan
      run: uv run python -m tools.ai_sdlc.cli security --container
      continue-on-error: true

    - name: Upload security evidence
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-evidence
        path: |
          .ai-sdlc/evidence/security/

  # ═══════════════════════════════════════════════════════════
  # Stage 3a: Plan (runs automatically — produces Terraform plan for review)
  # ═══════════════════════════════════════════════════════════
  plan:
    needs: [quality, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        create_credentials_file: true
        export_environment_variables: true

    - name: Set up Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Verify GCP access (plan)
      run: |
        gcloud projects describe "${{ secrets.GCP_PROJECT_ID }}" > /dev/null
        gcloud services list --enabled --project="${{ secrets.GCP_PROJECT_ID }}" > /dev/null

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"

    - name: Ensure Terraform state bucket
      run: |
        set -euo pipefail
        TF_STATE_BUCKET="${{ secrets.GCP_PROJECT_ID }}-tfstate"
        if gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" > /dev/null 2>&1; then
          echo "Terraform state bucket exists: gs://${TF_STATE_BUCKET}"
        else
          echo "Creating Terraform state bucket: gs://${TF_STATE_BUCKET}"
          gcloud storage buckets create "gs://${TF_STATE_BUCKET}" --location=us-east1 --uniform-bucket-level-access
          gcloud storage buckets update "gs://${TF_STATE_BUCKET}" --versioning
        fi

    - name: Terraform Init
      working-directory: deployment/terraform/single-project
      env:
        TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      run: |
        terraform init -reconfigure \
          -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-tfstate" \
          -backend-config="prefix=single-project"

    - name: Terraform Plan (for review)
      working-directory: deployment/terraform/single-project
      env:
        TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      run: |
        set +e
        terraform plan \
          -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="region=us-east1" \
          -var="gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
          -no-color > plan.txt 2>&1
        plan_exit_code=$?

        cat plan.txt
        echo "## Terraform Plan (for review)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat plan.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        if [ "$plan_exit_code" -ne 0 ]; then
          echo "::error::Terraform plan failed with exit code $plan_exit_code"
          exit "$plan_exit_code"
        fi

    - name: Upload Terraform plan
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: deployment/terraform/single-project/plan.txt
        retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # Stage 3b: Deploy (main push only — REQUIRES MANUAL APPROVAL)
  #
  # The "pilot" GitHub Environment has required reviewers configured.
  # After the plan job completes, this job starts but PAUSES.
  # A human reviewer must click "Review deployments" → "Approve"
  # in the GitHub Actions UI before Terraform apply and agents-cli
  # deploy execute.
  #
  # The reviewer can see the Terraform plan in:
  #   1. The plan job's step summary (GitHub Actions run page)
  #   2. The uploaded "terraform-plan" artifact
  #
  # ═══════════════════════════════════════════════════════════
  deploy:
    needs: [plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pilot
    defaults:
      run:
        working-directory: .
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync --all-extras --dev
        pip install google-agents-cli

    # --- Authenticate to Google Cloud ---
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        create_credentials_file: true
        export_environment_variables: true

    - name: Set up Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Verify GCP access (deploy)
      run: |
        gcloud projects describe "${{ secrets.GCP_PROJECT_ID }}" > /dev/null
        gcloud services list --enabled --project="${{ secrets.GCP_PROJECT_ID }}" > /dev/null

    # --- Step 1: Terraform (Firestore + GCS + IAM + Cloud Run shell) ---
    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"

    - name: Ensure Terraform state bucket
      run: |
        set -euo pipefail
        TF_STATE_BUCKET="${{ secrets.GCP_PROJECT_ID }}-tfstate"
        if gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" > /dev/null 2>&1; then
          echo "Terraform state bucket exists: gs://${TF_STATE_BUCKET}"
        else
          echo "Creating Terraform state bucket: gs://${TF_STATE_BUCKET}"
          gcloud storage buckets create "gs://${TF_STATE_BUCKET}" --location=us-east1 --uniform-bucket-level-access
          gcloud storage buckets update "gs://${TF_STATE_BUCKET}" --versioning
        fi

    - name: Terraform Init
      working-directory: deployment/terraform/single-project
      env:
        TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      run: |
        terraform init -reconfigure \
          -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-tfstate" \
          -backend-config="prefix=single-project"

    - name: Import existing default Firestore database if present
      working-directory: deployment/terraform/single-project
      env:
        TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_region: us-east1
        TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      run: |
        if terraform state show google_firestore_database.database > /dev/null 2>&1; then
          echo "Firestore default database already tracked in Terraform state."
          exit 0
        fi

        if gcloud firestore databases describe --project="${{ secrets.GCP_PROJECT_ID }}" --database="(default)" > /dev/null 2>&1; then
          echo "Existing Firestore default database found; importing into Terraform state."
          terraform import \
            -input=false \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=us-east1" \
            google_firestore_database.database \
            "projects/${{ secrets.GCP_PROJECT_ID }}/databases/(default)"
        else
          echo "No existing Firestore default database found; Terraform will create it."
        fi

    - name: Import existing Terraform resources if present
      working-directory: deployment/terraform/single-project
      env:
        TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_region: us-east1
        TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      run: |
        set -euo pipefail

        PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
        PROJECT_NUMBER="$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')"
        APP_SA_EMAIL="agentic-agri-advisor-app@${PROJECT_ID}.iam.gserviceaccount.com"

        # Service account
        if ! terraform state show google_service_account.app_sa > /dev/null 2>&1; then
          if gcloud iam service-accounts describe "$APP_SA_EMAIL" --project="$PROJECT_ID" > /dev/null 2>&1; then
            echo "Importing existing app service account..."
            terraform import -input=false google_service_account.app_sa "projects/${PROJECT_ID}/serviceAccounts/${APP_SA_EMAIL}" || true
          fi
        fi

        # Logs bucket
        if ! terraform state show google_storage_bucket.logs_data_bucket > /dev/null 2>&1; then
          if gcloud storage buckets describe "gs://${PROJECT_ID}-agentic-agri-advisor-logs" > /dev/null 2>&1; then
            echo "Importing existing logs bucket..."
            terraform import -input=false google_storage_bucket.logs_data_bucket "${PROJECT_ID}-agentic-agri-advisor-logs" || true
          fi
        fi

        # Assets bucket
        if ! terraform state show google_storage_bucket.assets_bucket > /dev/null 2>&1; then
          if gcloud storage buckets describe "gs://${PROJECT_ID}-agentic-agri-advisor-assets" > /dev/null 2>&1; then
            echo "Importing existing assets bucket..."
            terraform import -input=false google_storage_bucket.assets_bucket "${PROJECT_ID}-agentic-agri-advisor-assets" || true
          fi
        fi

        # BigQuery dataset
        if ! terraform state show google_bigquery_dataset.telemetry_dataset > /dev/null 2>&1; then
          if bq --project_id="$PROJECT_ID" show --dataset "${PROJECT_ID}:agentic_agri_advisor_telemetry" > /dev/null 2>&1; then
            echo "Importing existing telemetry dataset..."
            terraform import -input=false google_bigquery_dataset.telemetry_dataset "projects/${PROJECT_ID}/datasets/agentic_agri_advisor_telemetry" || true
          fi
        fi

        # BigQuery connection
        if ! terraform state show google_bigquery_connection.genai_telemetry_connection > /dev/null 2>&1; then
          if bq --project_id="$PROJECT_ID" show --connection --location=us-east1 "${PROJECT_ID}.us-east1.agentic-agri-advisor-genai-telemetry" > /dev/null 2>&1; then
            echo "Importing existing telemetry connection..."
            terraform import -input=false google_bigquery_connection.genai_telemetry_connection "projects/${PROJECT_ID}/locations/us-east1/connections/agentic-agri-advisor-genai-telemetry" || true
          fi
        fi

        # Cloud Build SA role binding on default compute SA (if already exists)
        if ! terraform state show google_project_iam_member.default_compute_sa_storage_object_creator > /dev/null 2>&1; then
          MEMBER="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          ROLE="roles/cloudbuild.builds.builder"
          if gcloud projects get-iam-policy "$PROJECT_ID" \
              --flatten="bindings[]" \
              --filter="bindings.role:${ROLE} AND bindings.members:${MEMBER}" \
              --format="value(bindings.role)" | grep -q "${ROLE}"; then
            echo "Importing existing project IAM member binding..."
            terraform import -input=false google_project_iam_member.default_compute_sa_storage_object_creator "${PROJECT_ID} ${ROLE} ${MEMBER}" || true
          fi
        fi

    - name: Download Terraform plan (from plan job)
      uses: actions/download-artifact@v4
      with:
        name: terraform-plan
        path: deployment/terraform/single-project/

    - name: Display Terraform plan for reviewer reference
      working-directory: deployment/terraform/single-project
      run: |
        echo "══════════════════════════════════════════════════════"
        echo "  TERRAFORM PLAN (reviewed before approval)"
        echo "══════════════════════════════════════════════════════"
        cat plan.txt

    - name: Terraform Apply
      working-directory: deployment/terraform/single-project
      env:
        TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      run: |
        terraform apply -auto-approve \
          -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="region=us-east1" \
          -var="gemini_api_key=${{ secrets.GEMINI_API_KEY }}"

    - name: Terraform Outputs
      working-directory: deployment/terraform/single-project
      run: |
        echo "## Deployment Infrastructure" >> $GITHUB_STEP_SUMMARY
        echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Firestore DB | $(terraform output -raw firestore_database) |" >> $GITHUB_STEP_SUMMARY
        echo "| Logs Bucket | $(terraform output -raw logs_bucket_name) |" >> $GITHUB_STEP_SUMMARY
        echo "| Assets Bucket | $(terraform output -raw assets_bucket_name) |" >> $GITHUB_STEP_SUMMARY
        echo "| Cloud Run URL | $(terraform output -raw cloud_run_service_url) |" >> $GITHUB_STEP_SUMMARY

    # --- Step 2: agents-cli deploy (builds + pushes image, updates Cloud Run) ---
    - name: Deploy with agents-cli
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        GOOGLE_CLOUD_LOCATION: us-east1
        USE_FIRESTORE: "1"
        FIRESTORE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        set -euo pipefail
        echo "🚀 Deploying app via agents-cli deploy..."
        agents-cli deploy --region=us-east1 2>&1 | tee agents_cli_deploy.log

    - name: Upload agents-cli deploy log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: agents-cli-deploy-log
        path: agents_cli_deploy.log
        retention-days: 7

    # --- Verify ---
    - name: Health Check
      working-directory: deployment/terraform/single-project
      run: |
        set -euo pipefail
        SERVICE_URL=$(terraform output -raw cloud_run_service_url)
        echo "Waiting for service to warm up..."
        sleep 15
        echo "Checking: ${SERVICE_URL}/api/profile/user"

        http_code=$(curl -sS -o /tmp/health_response.json -w "%{http_code}" "${SERVICE_URL}/api/profile/user")
        if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
          echo "::error::Health check failed with HTTP ${http_code}"
          echo "Response body:"
          cat /tmp/health_response.json || true
          exit 1
        fi

        python3 -m json.tool /tmp/health_response.json | head -10
        echo "::notice::Deployed to ${SERVICE_URL}"