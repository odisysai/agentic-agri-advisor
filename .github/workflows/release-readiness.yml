name: Release Readiness Evaluation

on:
  release:
    types: [created]

jobs:
  evaluate-readiness:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: .
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync --all-extras --dev

    - name: Compile Release Evidence
      run: |
        uv run python -m tools.ai_sdlc.cli evidence
        uv run python -m tools.ai_sdlc.cli security --secrets --dependencies --sast
        uv run python -m tools.ai_sdlc.cli release --report --version "${{ github.event.release.tag_name }}"

    - name: Archive Evidence Packages
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: release-evidence
        path: |
          .ai-sdlc/evidence/
          .ai-sdlc/reports/
