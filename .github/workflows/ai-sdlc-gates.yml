name: AI-SDLC Compliance Gates

on:
  pull_request:
    branches: [ main ]

jobs:
  verify-gates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync --all-extras --dev

    - name: Verify Requirements Traceability
      run: uv run python -m tools.ai_sdlc.cli requirements

    - name: Verify Evidence Manifest
      run: uv run python -m tools.ai_sdlc.cli evidence --verify

    - name: Verify Quality Scorecard
      run: uv run python -m tools.ai_sdlc.generate_quality_scorecard

    - name: Archive AI-SDLC Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ai-sdlc-reports
        path: |
          .ai-sdlc/reports/
          .ai-sdlc/evidence/evidence-manifest.json
